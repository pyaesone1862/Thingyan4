<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songkran 2026</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: #b3e5fc;
            font-family: sans-serif;
        }

        /* မိုးရေစက် Animation */
        .rain-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; pointer-events: none;
        }
        .drop {
            position: absolute; width: 2px; height: 15px;
            background: rgba(255, 255, 255, 0.7);
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* Screen Wrapper */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10;
        }

        /* ငွေဖလားပုံ */
        .bowl-img {
            width: 70%; max-width: 250px;
            cursor: pointer; z-index: 20;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            transition: transform 0.2s;
        }

        /* Glass UI Button */
        .glass-btn {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 12px 30px;
            color: #fff; font-weight: bold; font-size: 0.9rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }

        /* ဗီဒီယိုကို ဖုန်း Screen နဲ့ အံကိုက်ဖြစ်အောင်ညှိတာ */
        .fs-video {
            position: fixed;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            object-fit: contain; /* ဗီဒီယိုတစ်ခုလုံး မြင်ရအောင် contain သုံးထားပါတယ် */
            transform: translate(-50%, -50%);
            display: none; z-index: 30;
            background: #000; /* ဗီဒီယိုဘေးမှာ အမည်းရောင် ပိတ်ထားဖို့ */
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="rain-container" id="rain"></div>

    <div id="first-screen" class="screen">
        <img src="first.png" class="bowl-img" onclick="startApp()" alt="Bowl">
        <div class="glass-btn">ရေလောင်းရန် ငွေဖလားကို နှိပ်ပါ</div>
    </div>

    <video id="vid-splash" class="fs-video" playsinline>
        <source src="second.mp4" type="video/mp4">
    </video>

    <video id="vid-music" class="fs-video" playsinline loop>
        <source src="third.mp4" type="video/mp4">
    </video>

    <script>
        function makeRain() {
            const container = document.getElementById('rain');
            for (let i = 0; i < 50; i++) {
                const drop = document.createElement('div');
                drop.classList.add('drop');
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
                drop.style.opacity = Math.random();
                container.appendChild(drop);
            }
        }
        makeRain();

        function startApp() {
            const screen1 = document.getElementById('first-screen');
            const splash = document.getElementById('vid-splash');
            const music = document.getElementById('vid-music');

            screen1.classList.add('hidden');
            splash.style.display = 'block';
            
            // အသံပါအောင် နှိပ်လိုက်တဲ့အချိန်မှာ play ခိုင်းတာပါ
            splash.muted = false; 
            splash.play().catch(e => {
                console.log("Audio play error", e);
                // တကယ်လို့ browser က ပိတ်ထားရင် muted နဲ့အရင်ဖွင့်မယ်
                splash.muted = true;
                splash.play();
            });

            splash.onended = function() {
                splash.style.display = 'none';
                music.style.display = 'block';
                music.muted = false;
                music.play();
            };
        }
    </script>
</body>
</html>
