<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Songkran 2026</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: #000;
            font-family: sans-serif;
        }

        /* ရေစက်ကျတဲ့ Animation */
        .rain-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        .drop {
            position: absolute; width: 2px; height: 15px;
            background: rgba(255, 255, 255, 0.6);
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* First Screen */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10;
            background: #d0f0f5;
        }

        .bowl-img {
            width: 75%; max-width: 280px;
            cursor: pointer; z-index: 20;
        }

        .glass-btn {
            margin-top: 20px; background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border-radius: 12px; padding: 12px 24px;
            font-weight: bold; color: #333; border: 1px solid rgba(255,255,255,0.3);
        }

        /* Fullscreen Video - Size ညှိထားတာ */
        .fs-video {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: fill; /* Android Screen အပြည့် ဖြစ်သွားအောင် */
            display: none; z-index: 30;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="rain-container" id="rain"></div>

    <div id="first-screen" class="screen">
        <img src="first.png" class="bowl-img" onclick="startApp()">
        <div class="glass-btn">ရေလောင်းရန် နှိပ်ပါ 💦</div>
    </div>

    <video id="vid-splash" class="fs-video" playsinline>
        <source src="second.mp4" type="video/mp4">
    </video>

    <video id="vid-music" class="fs-video" playsinline loop>
        <source src="third.mp4" type="video/mp4">
    </video>

    <script>
        // ရေစက်ကျအောင်လုပ်တာ
        function makeRain() {
            const container = document.getElementById('rain');
            for (let i = 0; i < 50; i++) {
                const drop = document.createElement('div');
                drop.classList.add('drop');
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
                container.appendChild(drop);
            }
        }
        makeRain();

        function startApp() {
            const screen1 = document.getElementById('first-screen');
            const splash = document.getElementById('vid-splash');
            const music = document.getElementById('vid-music');

            // Screen ပြောင်းမယ်
            screen1.classList.add('hidden');
            splash.style.display = 'block';
            
            // အသံပါအောင် လုပ်ပြီး Play မယ်
            splash.muted = false;
            splash.play().catch(err => {
                // Browser က block ရင်တောင် play အောင်လုပ်တာ
                splash.muted = true;
                splash.play();
            });

            // ဒုတိယဗီဒီယိုပြီးရင်
            splash.onended = function() {
                splash.style.display = 'none';
                music.style.display = 'block';
                music.muted = false;
                music.play();
            };
        }
    </script>
</body>
</html>
