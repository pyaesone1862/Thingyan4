<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songkran Blessing 2026</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: #d0f0f5; 
            font-family: sans-serif;
        }

        /* ရေစက်ကျတဲ့ Animation */
        .rain-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        .drop {
            position: absolute; width: 3px; height: 18px;
            background: rgba(255, 255, 255, 0.8);
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(110vh); }
        }

        /* Screen Wrapper */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10;
        }

        /* Silver Bowl Styling */
        .bowl-img {
            width: 80%; max-width: 300px;
            cursor: pointer; z-index: 20;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            transition: transform 0.2s;
        }
        .bowl-img:active { transform: scale(0.9); }

        /* Glass UI Button */
        .glass-btn {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 15px 40px;
            color: #444; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            pointer-events: none; /* ပုံကိုပဲ နှိပ်စေချင်လို့ */
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; }
        }

        /* Fullscreen Video */
        .fs-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; display: none; z-index: 30;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="rain-container" id="rain"></div>

    <div id="first-screen" class="screen">
        <img src="first.png" class="bowl-img" onclick="startApp()" alt="Bowl">
        <div class="glass-btn">ရေလောင်းရန် ငွေဖလားကို နှိပ်ပါ</div>
    </div>

    <video id="vid-splash" class="fs-video" playsinline muted>
        <source src="second.mp4" type="video/mp4">
    </video>

    <video id="vid-music" class="fs-video" playsinline muted loop>
        <source src="third.mp4" type="video/mp4">
    </video>

    <script>
        // ရေစက်ကျအောင်လုပ်မယ်
        function makeRain() {
            const container = document.getElementById('rain');
            for (let i = 0; i < 60; i++) {
                const drop = document.createElement('div');
                drop.classList.add('drop');
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
                drop.style.opacity = Math.random();
                container.appendChild(drop);
            }
        }
        makeRain();

        function startApp() {
            const screen1 = document.getElementById('first-screen');
            const splash = document.getElementById('vid-splash');
            const music = document.getElementById('vid-music');

            screen1.classList.add('hidden');
            splash.style.display = 'block';
            
            // Splash video ကို play မယ်
            splash.play().catch(e => console.log("Play error", e));

            // Splash video ပြီးရင် music video ကိုပြမယ်
            splash.onended = function() {
                splash.style.display = 'none';
                music.style.display = 'block';
                music.play().catch(e => console.log("Music play error", e));
            };
        }
    </script>
</body>
</html>
