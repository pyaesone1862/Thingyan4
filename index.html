<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songkran 2026</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: #000; /* Video ကြည့်ရတာ လှအောင် အမည်းရောင်ထားတာ */
            font-family: sans-serif;
        }

        /* ရေစက်ကျတဲ့ Animation */
        .rain-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        .drop {
            position: absolute; width: 2px; height: 15px;
            background: rgba(255, 255, 255, 0.6);
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh); } }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10;
            background: #d0f0f5;
        }

        .bowl-img {
            width: 70%; max-width: 250px;
            cursor: pointer; z-index: 20;
            transition: transform 0.2s;
        }

        .glass-btn {
            margin-top: 20px; background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px); border-radius: 10px;
            padding: 10px 20px; font-weight: bold; color: #333;
        }

        /* Fullscreen Video - Size ပြင်ထားပါတယ် */
        .fs-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; /* Video တစ်ခုလုံးကို screen ထဲဝင်အောင် အချိုးကျ ပြင်တာ */
            display: none; z-index: 30;
            background: #000;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="rain-container" id="rain"></div>

    <div id="first-screen" class="screen">
        <img src="first.png" class="bowl-img" onclick="startApp()">
        <div class="glass-btn">ရေလောင်းရန် နှိပ်ပါ 💦</div>
    </div>

    <video id="vid-splash" class="fs-video" playsinline>
        <source src="second.mp4" type="video/mp4">
    </video>

    <video id="vid-music" class="fs-video" playsinline loop>
        <source src="third.mp4" type="video/mp4">
    </video>

    <script>
        function makeRain() {
            const container = document.getElementById('rain');
            for (let i = 0; i < 50; i++) {
                const drop = document.createElement('div');
                drop.classList.add('drop');
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
                container.appendChild(drop);
            }
        }
        makeRain();

        function startApp() {
            const screen1 = document.getElementById('first-screen');
            const splash = document.getElementById('vid-splash');
            const music = document.getElementById('vid-music');

            screen1.classList.add('hidden');
            splash.style.display = 'block';
            
            // User က နှိပ်လိုက်ပြီဖြစ်လို့ အသံကို ဖွင့်လို့ရသွားပါပြီ (Unmute)
            splash.muted = false; 
            splash.play();

            splash.onended = function() {
                splash.style.display = 'none';
                music.style.display = 'block';
                music.muted = false;
                music.play();
            };
        }
    </script>
</body>
</html>
